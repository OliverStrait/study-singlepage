<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Notebook</title>
    <style>
        :root {
            --radius: 12px;
        }

        body {
            background-color: antiquewhite;
        }

        .module {
            overflow-y: scroll;
            max-height: 50vh;
            width: 400px;
            margin: auto;
            padding: 1em;
            background-color: rgb(242, 245, 247);
            border-radius: var(--radius);
            margin-bottom: 1em;
            box-shadow: 2px 2px rgb(214, 207, 207);
        }

        form {
            padding: 1em;

            @media screen {
                label {
                    display: hidden;
                }
            }

            textarea {
                margin-bottom: .5em;

                display: block;
                padding: .5em;

                width: 80%;
                min-height: 30vh;
            }
        }

        textarea,
        input {
            padding: .5em;
            display: block;
            margin-bottom: .5em;
            border-radius: var(--radius);
        }

        button {
            padding: .5em;
            background-color: rgb(175, 196, 189);
            border-radius: 100vw;
        }

        .notes {
            max-height: 30vh;
        }

        .note {
            border: 1px grey solid;
            border-radius: 1em;
            padding: 1em;
            margin-bottom: 1em;


            .header {

                h3 {
                    display: inline-block;
                    margin: 0;
                }

                button {
                    float: right;
                }

                button:hover {
                    background-color: beige;
                    display: block
                }
            }
        }
    </style>
</head>

<body>
    <div id="note-field" class="module notes">
        <section class="note" id="1772008395189">
            <div class="header">
                <h3>This is mockup for static page. JS will remove and render actual content</h3>
                <button>Remove</button>
            </div>

            <p>Lorem ipsum dolor sit amet consectetur,<br />
                Epsium diolom utre man
            </p>
        </section>
    </div>

    <form id="note-editor" class="module">
        <label for="title">Title</label>
        <input type="text" id="note-title" name="title" placeholder="Note title" required>
        <label for="note">Note</label>
        <textarea id="note-content" name="note" placeholder="What you have in your mind today?" required></textarea>
        <input type="submit" value="Submit">
    </form>
</body>

<script>
    class WebStorage {
        FUNC = localStorage
        constructor(tag) { this.tag = String(tag); }
        get_object() { return JSON.parse(this.FUNC.getItem(this.tag)) }
        put_object(obj) { this.FUNC.setItem(this.tag, JSON.stringify(obj)) }
        delete(bool = false) { (bool) ? this.FUNC.clear(this.tag) : undefined }
    }

    /**Clear value of form element**/
    const clearVal = (DOM_LIST) => {
        DOM_LIST.forEach((a) => a.value = "")
    }

    function smoothScrollId(id) {
        let elem = document.getElementById(id)
        elem?.scrollIntoView({ behavior: "smooth", block: "end", inline: "nearest" })
    }

    const note_submit = (title, content, Storrage) => {
        let notes = Storrage.get_object()
        console.log(notes.notes)
        let obj = {
            id: Date.now(),
            t: title.value,
            date: new Date().toLocaleString(),
            n: content.value.replace(/\n|\r/gm, "<br/>")
        }
        notes.notes = [obj].concat(notes.notes)
        Storrage.put_object(notes)
        clearVal([title, content])
    }

    const STORRAGE = new WebStorage("notes")
    let oldNotes = STORRAGE.get_object()
    if (!oldNotes) {
        newNotes = { ver: 1, notes: [] }
        STORRAGE.put_object(newNotes)
    }

    const submitForm = document.getElementById("note-editor")
    const note_field = document.getElementById("note-field")
    const title = document.getElementById("note-title")
    const content = document.getElementById("note-content")

    function remove_note(id) {
        let notes_stor = STORRAGE.get_object()
        let notes = notes_stor.notes
        var new_notes = []
        for (let note of notes)
            if (!(note.id == id)) new_notes.push(note)
        notes_stor.notes = new_notes
        STORRAGE.put_object(notes_stor)
        render_notes()
    }

    const render_notes = () => {
        note_field.innerHTML = ""

        let notes = STORRAGE.get_object().notes

        for (let note of notes) {

            let sect = document.createElement("section")
            sect.id = note.id
            sect.classList.add("note")
            note_field.appendChild(sect)
            //header
            {
                let header = document.createElement("div")
                header.classList.add("header")
                sect.appendChild(header)
                let title = document.createElement("h3")
                title.textContent = note.t
                let date = document.createElement("p")
                date.textContent = note.date
                let remove_button = document.createElement("button")
                remove_button.textContent = "Remove"
                remove_button.addEventListener("click", () => remove_note(note.id))
                header.appendChild(date)
                header.appendChild(remove_button)
                header.appendChild(title)

            }

            // NOTE
            {
                let note_str = "<p class='note'>" + note.n + "</p>"
                let parser = new DOMParser()
                let note_content = parser.parseFromString(note_str, "text/html")
                sect.appendChild(note_content.getElementsByClassName("note")[0])
            }
        }
        if (notes.length > 0) smoothScrollId(notes[0].id)
    }

    render_notes()
    submitForm.addEventListener("submit", (e) => { e.preventDefault(); note_submit(title, content, STORRAGE); render_notes() })

</script>

</html>
